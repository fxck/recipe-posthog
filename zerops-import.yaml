#zeropsPreprocessor=true
project:
  name: posthog
  description: |
    Self-hosted PostHog on Zerops native managed services. No Docker.
    Lifts the official PostHog images (posthog/posthog + posthog/posthog-node) via crane
    and runs Django + Celery + the Node plugin-server directly on Zerops runtimes.
  tags:
    - posthog
    - analytics
    - recipe
  # Generated once at import; shared (unprefixed) across web, worker, and pluginserver.
  envVariables:
    # Django session/CSRF/etc. crypto. PostHog refuses to boot in production with the literal default.
    SECRET_KEY: <@generateRandomString(64)>
    # Fernet-derived field encryption used by integrations + hog functions. PostHog default is "00beef0000beef0000beef0000beef00".
    ENCRYPTION_SALT_KEYS: <@generateRandomString(32)>
    # Older symmetric salt for encrypted_fields helper. PostHog default is "0123456789abcdefghijklmnopqrstuvwxyz".
    SALT_KEY: <@generateRandomString(32)>
    # Shared Django ↔ Node plugin-server internal-API auth. PostHog default is the literal "posthog123" (LOCAL_DEV_INTERNAL_API_SECRET). Must match across services.
    INTERNAL_API_SECRET: <@generateRandomString(32)>

services:
  # Managed dependencies — order doesn't matter, Zerops resolves provisioning order.

  - hostname: db
    type: postgresql@18
    mode: NON_HA
    priority: 10

  # Dedicated Postgres for Cyclotron's job queue. Cyclotron churns the table heavily
  # (insert-per-fire, delete-per-ack); keeping it off `db` protects PostHog's transactional writes.
  - hostname: cyclotrondb
    type: postgresql@18
    mode: NON_HA
    priority: 10

  - hostname: clickhouse
    type: clickhouse@25.3
    # HA mandatory: PostHog issues ON CLUSTER DDL against the `zerops` cluster, which only
    # exists in HA mode along with Keeper + the macros PostHog's migrations reference.
    mode: HA
    priority: 10

  - hostname: kafka
    type: kafka@3.9
    mode: NON_HA
    priority: 10

  - hostname: valkey
    type: valkey@7.2
    mode: NON_HA
    priority: 10

  - hostname: storage
    type: object-storage
    objectStorageSize: 10
    priority: 10

  # SMTP sink — Mailpit catches every outbound mail and exposes a web inbox on :8025.
  # We use the official Zerops recipe verbatim; PostHog's EMAIL_HOST in zerops.yml points here.
  - hostname: mailpit
    type: alpine@3.20
    buildFromGit: https://github.com/zeropsio/recipe-mailpit
    enableSubdomainAccess: true
    priority: 10

  # Runtime services — buildFromGit clones this repo into /var/www on the build container,
  # zerops.yml's deployFiles ships utils/ to runtime, run.prepareCommands lifts the image.

  # Per-service sizings below are the LOWEST that boot cleanly + handle modest production load.
  # Vertical autoscaling lifts CPU/RAM as the workload grows. Node services cap at 2 cores —
  # JS is single-event-loop, only libuv pool + Piscina workers + V8 GC threads use extra cores.
  # Python services use gunicorn/Celery worker processes that DO scale linearly with cores.
  # Bumping maxContainers > 1 enables horizontal scaling once vertical hits the ceiling.
  - hostname: web
    type: ubuntu/python@3.12
    buildFromGit: https://github.com/fxck/recipe-posthog
    zeropsSetup: web
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      minCpu: 1
      maxCpu: 2
      minRam: 0.5
      maxRam: 2
    priority: 5

  - hostname: worker
    type: ubuntu/python@3.12
    buildFromGit: https://github.com/fxck/recipe-posthog
    zeropsSetup: worker
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      minCpu: 1
      maxCpu: 2
      minRam: 0.5
      maxRam: 2
    priority: 5

  - hostname: pluginserver
    type: ubuntu/nodejs@24
    buildFromGit: https://github.com/fxck/recipe-posthog
    zeropsSetup: pluginserver
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      minCpu: 1
      maxCpu: 2
      # Default-mode pluginserver loads CDP + flags + logs + error-tracking — biggest Node bundle
      minRam: 0.75
      maxRam: 2
    priority: 5

  # ingestion-v2 — the main event-ingestion path (Kafka → enrich → ClickHouse). Split out so it
  # can scale independently of CDP / feature-flag work on the default `pluginserver`.
  - hostname: ingestion
    type: ubuntu/nodejs@24
    buildFromGit: https://github.com/fxck/recipe-posthog
    zeropsSetup: ingestion
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      minCpu: 1
      maxCpu: 2
      minRam: 0.5
      maxRam: 2
    priority: 5

  # recordings-blob-ingestion-v2 — pulls session-replay blobs from Kafka into object storage.
  # High-throughput path, isolated for the same reason as `ingestion`.
  - hostname: recordings
    type: ubuntu/nodejs@24
    buildFromGit: https://github.com/fxck/recipe-posthog
    zeropsSetup: recordings
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      minCpu: 1
      maxCpu: 2
      minRam: 0.5
      maxRam: 2
    priority: 5

  # cdp-cyclotron-worker — drains the Cyclotron job queue (hog-function destinations with retries).
  # Needs CYCLOTRON_NODE_DATABASE_URL pointed at cyclotrondb; the worker won't usefully fire
  # without the schema applied by utils/cyclotron-migrations.sh first.
  - hostname: cyclotron
    type: ubuntu/nodejs@24
    buildFromGit: https://github.com/fxck/recipe-posthog
    zeropsSetup: cyclotron
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      # Lightweight job drainer; doesn't need pluginserver headroom
      minCpu: 0.5
      maxCpu: 1
      minRam: 0.5
      maxRam: 1
    priority: 5

  # capture-rs — high-throughput capture endpoints (events / recordings) built from our SASL-patched
  # fork of PostHog's rust/ tree. PostHog Cloud uses this binary in front of Django; we expose it as
  # a separate subdomain so apps point their PostHog JS at api_host: capture-* and ui_host: web-*.
  - hostname: capture
    type: ubuntu/rust@stable
    buildFromGit: https://github.com/fxck/posthog-capture
    zeropsSetup: capture
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      # Rust binary is tiny at rest (~30 MB RSS); Tokio runtime scales effectively with cores
      minCpu: 0.5
      maxCpu: 2
      minRam: 0.25
      maxRam: 1
    priority: 5
